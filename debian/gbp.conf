[DEFAULT]
# Git-buildpackage configuration

pristine-tar = False
sign-tags = False

[buildpackage]
# Build configuration
export-dir = ../build-area/
ignore-new = True

# Don't clean by default (cmake handles this)
cleaner = true

# Recurse git submodules into the source tarball so the .dsc is
# self-contained — sbuild / salsa-ci have no git state and no network,
# so an empty third_party/rpi-verity-verifier would fail at cmake time.
submodules = True

